<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="SF Mono,Menlo,monospace">
  <rect width="1200" height="630" fill="#0f1420"/>

  <!-- Decorative slot grid (subtle) -->
  <g opacity="0.08" stroke="#5db1ff" stroke-width="1">
    <line x1="0"   y1="80"  x2="1200" y2="80"/>
    <line x1="0"   y1="550" x2="1200" y2="550"/>
    <line x1="600" y1="80"  x2="600"  y2="550"/>
  </g>

  <!-- Title -->
  <text x="80" y="180" font-size="64" font-weight="700" fill="#e7ecf5">ocudu-gpu-channel</text>
  <text x="80" y="220" font-size="22" fill="#9aa7bd">Zhouyou Gu · SUTD · github.com/zhouyou-gu/ocudu-gpu-channel</text>

  <!-- Tagline -->
  <text x="80" y="310" font-size="34" fill="#cdd6e6">GPU-accelerated, ZMQ-native channel emulator</text>
  <text x="80" y="350" font-size="34" fill="#cdd6e6">for live srsRAN and OCUDU stacks.</text>

  <!-- Visual: HOST → DEVICE → STREAM arrow -->
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="220" height="80" rx="10" fill="#13391f" stroke="#6fd08c" stroke-width="2"/>
    <text x="110" y="38" text-anchor="middle" font-size="22" fill="#6fd08c">HOST</text>
    <text x="110" y="60" text-anchor="middle" font-size="14" fill="#cdd6e6">ZMQ I/O · pack</text>

    <line x1="220" y1="40" x2="265" y2="40" stroke="#9aa7bd" stroke-width="3"/>
    <polygon points="265,32 285,40 265,48" fill="#9aa7bd"/>

    <rect x="290" y="0" width="280" height="80" rx="10" fill="#0b101a" stroke="#5db1ff" stroke-width="2"/>
    <text x="430" y="38" text-anchor="middle" font-size="22" fill="#5db1ff">CUDA</text>
    <text x="430" y="60" text-anchor="middle" font-size="14" fill="#cdd6e6">apply_channel · superpose · rx</text>

    <line x1="570" y1="40" x2="615" y2="40" stroke="#9aa7bd" stroke-width="3"/>
    <polygon points="615,32 635,40 615,48" fill="#9aa7bd"/>

    <rect x="640" y="0" width="220" height="80" rx="10" fill="#0b101a" stroke="#ffb454" stroke-width="2"/>
    <text x="750" y="38" text-anchor="middle" font-size="22" fill="#ffb454">RX</text>
    <text x="750" y="60" text-anchor="middle" font-size="14" fill="#cdd6e6">slot-paced REP</text>
  </g>

  <!-- Bottom hint -->
  <text x="80" y="585" font-size="18" fill="#9aa7bd">TR 38.901 §7.7.2 TDL-A..E · multi-tap + Jakes + Rician LOS · &lt; 1 ms slot budget</text>
</svg>
