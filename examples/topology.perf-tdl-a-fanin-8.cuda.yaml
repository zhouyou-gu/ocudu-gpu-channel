# Perf measurement -- TDL-A fan-in 8.
#
# 1 gNB + 8 UEs, fully connected (16 edges total: 8 DL + 8 UL). Every link
# applies the TR 38.901 §7.7.2 TDL-A profile (23-tap NLOS, 100 ns delay
# spread, 100 Hz Doppler) so the GPU pays the realistic multi-tap convolution
# cost on every edge instead of the single-tap MVP path.
#
# Companion to the 1-edge TDL-A measurement (`examples/topology.tdl-a.cuda.yaml`)
# in `scripts/remote/perf-fanin-sweep.sh`: kernel µs grow as N · taps, so the
# 1-vs-8 comparison shows how the TDL convolution scales with fan-in under
# realistic multipath. Endpoints are loopback placeholders -- the bench
# never opens the sockets.
runtime:
  backend: cuda
  gpu_device: 0
  batch_samples: 23040
  queue_samples: 2457600
devices:
  - id: gnb0
    role: gnb
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18000
    rx_endpoint: tcp://*:18001
  - id: ue0
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18100
    rx_endpoint: tcp://*:18101
  - id: ue1
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18102
    rx_endpoint: tcp://*:18103
  - id: ue2
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18104
    rx_endpoint: tcp://*:18105
  - id: ue3
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18106
    rx_endpoint: tcp://*:18107
  - id: ue4
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18108
    rx_endpoint: tcp://*:18109
  - id: ue5
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18110
    rx_endpoint: tcp://*:18111
  - id: ue6
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18112
    rx_endpoint: tcp://*:18113
  - id: ue7
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:18114
    rx_endpoint: tcp://*:18115
links:
  - from: gnb0
    to: ue0
    model: tdl_a
  - from: ue0
    to: gnb0
    model: tdl_a
  - from: gnb0
    to: ue1
    model: tdl_a
  - from: ue1
    to: gnb0
    model: tdl_a
  - from: gnb0
    to: ue2
    model: tdl_a
  - from: ue2
    to: gnb0
    model: tdl_a
  - from: gnb0
    to: ue3
    model: tdl_a
  - from: ue3
    to: gnb0
