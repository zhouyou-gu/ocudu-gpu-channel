runtime:
  backend: cuda
  gpu_device: 0
  batch_samples: 23040
  queue_samples: 2457600
# Variant of topology.ocudu-docker.cuda.yaml that actively exercises both
# delay knobs introduced in this branch:
#   - device.tx_timing_offset_samples (gnb0): models a 4-sample constant
#     TX-start-time lag on the gNB endpoint. Folded into every link
#     originating from gnb0.
#   - link.propagation_delay_samples (ue0 -> gnb0): models a 3-sample
#     physical propagation along that edge.
# Both fold into the chain's leading delay step at config-load time. At
# 23.04 MS/s, 4 samples is ~52 m and 3 samples is ~39 m of free-space
# propagation -- well within attach tolerance for srsUE/srsRAN.
devices:
  - id: gnb0
    role: gnb
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:2000
    rx_endpoint: tcp://*:2001
    tx_timing_offset_samples: 4
  - id: ue0
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:2101
    rx_endpoint: tcp://*:2100
links:
  - from: gnb0
    to: ue0
    model: cuda_mvp
  - from: ue0
    to: gnb0
    model: cuda_mvp
    propagation_delay_samples: 3
models:
  cuda_mvp:
    chain:
      - type: gain
        gain_db: -3
      - type: phase
        phase_rad: 0.125
      - type: cfo
        cfo_hz: 250
        phase_rad: 0
