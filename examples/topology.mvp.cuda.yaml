runtime:
  backend: cuda
  gpu_device: 0
  batch_samples: auto
  queue_samples: 614400
devices:
  - id: gnb0
    role: gnb
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:2000
    rx_endpoint: tcp://127.0.0.1:2001
  - id: ue0
    role: ue
    sample_rate_hz: 23040000
    tx_endpoint: tcp://127.0.0.1:2101
    rx_endpoint: tcp://127.0.0.1:2100
links:
  - from: gnb0
    to: ue0
    model: cuda_mvp
  - from: ue0
    to: gnb0
    model: cuda_mvp
models:
  cuda_mvp:
    chain:
      - type: tdl
        taps:
          - delay_samples: 0.0
            gain_db: -3.0
            phase_rad: 0.0
      - type: phase
        phase_rad: 0.125
      - type: cfo
        cfo_hz: 250
        phase_rad: 0
